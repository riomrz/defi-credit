services:
  postgres:
    image: postgres:16-alpine
    container_name: deficredit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: deficredit
      POSTGRES_PASSWORD: deficredit
      POSTGRES_DB: deficredit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deficredit"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
